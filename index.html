<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/preview.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>Bank Vercel | Secure Digital Banking Platform & Crypto Investments</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://bankvercel.vercel.app/" />

    <!-- Meta Description -->
    <meta
      name="description"
      content="Bank Vercel is a secure digital banking platform offering online banking, crypto investments, loans, and financial management for individuals and businesses worldwide."
    />

    <meta name="author" content="Bank Vercel" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bankvercel.vercel.app/" />
    <meta property="og:title" content="Bank Vercel – Secure Digital Banking Platform" />
    <meta property="og:description" content="Manage banking, crypto, investments, and financial services in one secure platform." />
    <meta property="og:image" content="https://bankvercel.vercel.app/preview.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bank Vercel – Digital Banking Platform" />
    <meta name="twitter:description" content="Experience secure banking with crypto, investments, and financial tools." />
    <meta name="twitter:image" content="https://bankvercel.vercel.app/preview.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BankOrCreditUnion",
        "name": "Bank Vercel",
        "url": "https://bankvercel.vercel.app/",
        "description": "Bank Vercel is a secure digital banking platform offering online banking, crypto investments, and financial services.",
        "sameAs": [
          "https://twitter.com/",
          "https://linkedin.com/",
          "https://github.com/"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
