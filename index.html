<!doctype html>
<html lang="en">

      property="og:title"

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:title"
      content="Bank Vercel – Digital Banking Platform"

        "url": "https://bankvercel.vercel.app/",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "111 W 57th St Unit Quadplex 80",
          "addressLocality": "New York",

          "postalCode": "10019",
          "addressCountry": "US"
        }
